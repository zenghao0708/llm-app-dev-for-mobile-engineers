name: Validate book and examples

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install XML and SVG tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils librsvg2-bin

      - name: Validate book manifest
        run: python3 tools/manage_chapters.py validate

      - name: Validate second book manifest
        run: python3 tools/manage_chapters.py --manifest books/02-ai-coding-mobile-engineers/book-manifest.json validate

      - name: Validate third book manifest
        run: python3 tools/manage_chapters.py --manifest books/03-on-device-ai-mobile-engineers/book-manifest.json validate

      - name: Build first book manuscript
        run: python3 tools/build_book.py

      - name: Build second book manuscript
        run: |
          python3 tools/build_book.py \
            --manifest books/02-ai-coding-mobile-engineers/book-manifest.json \
            --output build/book-02-ai-coding-mobile-engineers.md

      - name: Build third book manuscript
        run: |
          python3 tools/build_book.py \
            --manifest books/03-on-device-ai-mobile-engineers/book-manifest.json \
            --output build/book-03-on-device-ai-mobile-engineers.md

      - name: Build EPUB ebook
        run: python3 tools/build_epub.py

      - name: Build second book EPUB ebook
        run: |
          python3 tools/build_epub.py \
            --manifest books/02-ai-coding-mobile-engineers/book-manifest.json \
            --output build/ebooks/ai-coding-mobile-engineers.epub

      - name: Build third book EPUB ebook
        run: |
          python3 tools/build_epub.py \
            --manifest books/03-on-device-ai-mobile-engineers/book-manifest.json \
            --output build/ebooks/on-device-ai-mobile-engineers.epub

      - name: Run book build tests
        run: python3 -m unittest discover -s tests

      - name: Run development environment check
        working-directory: examples/01-mobile-knowledge-assistant
        run: python3 scripts/dev_environment_check.py

      - name: Run unit tests
        working-directory: examples/01-mobile-knowledge-assistant
        env:
          PYTHONPATH: src
          PYTHONWARNINGS: error
        run: python3 -m unittest discover -s tests

      - name: Run AI coding refactor example tests
        working-directory: examples/02-ai-coding-mobile-refactor
        env:
          PYTHONPATH: src
          PYTHONWARNINGS: error
        run: python3 -m unittest discover -s tests

      - name: Compile Python examples
        working-directory: examples/01-mobile-knowledge-assistant
        run: |
          python3 -m py_compile \
            src/mobile_llm/*.py \
            scripts/answer_eval.py \
            scripts/dev_environment_check.py \
            scripts/image_ticket_payload.py \
            scripts/file_triage_agent.py \
            scripts/ops_report.py \
            scripts/prompt_contract_check.py \
            scripts/privacy_redaction.py \
            scripts/rag_eval.py \
            scripts/sampling_temperature_experiment.py \
            scripts/structured_tool_router.py \
            scripts/tfidf_vector_search.py \
            scripts/weekly_report_workflow.py \
            scripts/sse_client.py \
            scripts/rag_trace.py

      - name: Compile AI coding refactor example
        working-directory: examples/02-ai-coding-mobile-refactor
        run: python3 -m py_compile src/ai_refactor/*.py

      - name: Compile book build tooling
        run: python3 -m py_compile tools/build_book.py tools/build_epub.py tools/manage_chapters.py

      - name: Validate SVG diagrams
        run: xmllint --noout books/01-llm-app-dev-for-mobile-engineers/assets/diagrams/*.svg examples/01-mobile-knowledge-assistant/data/multimodal/login_error.svg
