<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M0 0 L12 6 L0 12 z" fill="#2f86b7"/>
    </marker>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 44px sans-serif; fill: #132033; }
      .subtitle { font: 500 20px sans-serif; fill: #5d6b7c; }
      .box { fill: #ffffff; stroke: #c8d4df; stroke-width: 2.5; rx: 14; }
      .box-blue { fill: #e8f5fb; stroke: #64b5df; stroke-width: 2.5; rx: 14; }
      .box-green { fill: #edf8f2; stroke: #78bea1; stroke-width: 2.5; rx: 14; }
      .box-yellow { fill: #fff8e6; stroke: #d7b95f; stroke-width: 2.5; rx: 14; }
      .box-red { fill: #fff1f1; stroke: #e58a8a; stroke-width: 2.5; rx: 14; }
      .label { font: 700 25px sans-serif; fill: #142033; text-anchor: middle; }
      .text { font: 500 18px sans-serif; fill: #5d6b7c; text-anchor: middle; }
      .arrow { stroke: #2f86b7; stroke-width: 5; fill: none; marker-end: url(#arrow-blue); }
      .log-line { stroke: #7a8898; stroke-width: 3.5; fill: none; stroke-dasharray: 10 8; }
      .caption { font: 500 18px sans-serif; fill: #667386; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1000"/>
  <text x="80" y="95" class="title">移动端周报工作流编排</text>
  <text x="80" y="132" class="subtitle">固定流程负责顺序和门禁，模型只处理草稿生成，高风险发布必须等待人工确认</text>

  <rect class="box" x="80" y="270" width="250" height="130"/>
  <text x="205" y="323" class="label">输入数据</text>
  <text x="205" y="358" class="text">任务 / 会议 / 提交</text>

  <rect class="box-blue" x="440" y="270" width="250" height="130"/>
  <text x="565" y="323" class="label">收集与校验</text>
  <text x="565" y="358" class="text">字段完整性</text>

  <rect class="box-green" x="800" y="270" width="250" height="130"/>
  <text x="925" y="323" class="label">生成草稿</text>
  <text x="925" y="358" class="text">模型或模板</text>

  <rect class="box-yellow" x="1160" y="270" width="250" height="130"/>
  <text x="1285" y="323" class="label">人工确认</text>
  <text x="1285" y="358" class="text">预览 / 修改 / 批准</text>

  <rect class="box-red" x="1520" y="270" width="250" height="130"/>
  <text x="1645" y="323" class="label">发布动作</text>
  <text x="1645" y="358" class="text">发送 / 写入 / 通知</text>

  <rect class="box" x="440" y="620" width="250" height="130"/>
  <text x="565" y="673" class="label">执行步骤记录</text>
  <text x="565" y="708" class="text">步骤 / 参数 / 结果</text>

  <rect class="box" x="800" y="620" width="250" height="130"/>
  <text x="925" y="673" class="label">移动端页面</text>
  <text x="925" y="708" class="text">确认页 / 取消 / 重试</text>

  <rect class="box" x="1160" y="620" width="250" height="130"/>
  <text x="1285" y="673" class="label">等待状态</text>
  <text x="1285" y="708" class="text">waiting_confirmation</text>

  <path class="arrow" d="M330 335 L438 335"/>
  <path class="arrow" d="M690 335 L798 335"/>
  <path class="arrow" d="M1050 335 L1158 335"/>
  <path class="arrow" d="M1410 335 L1518 335"/>

  <path class="arrow" d="M1285 400 L1285 618"/>
  <path class="arrow" d="M1160 685 L1052 685"/>

  <path class="log-line" d="M545 400 L545 620"/>
  <path class="log-line" d="M925 400 L925 520 L585 520 L585 620"/>
  <path class="log-line" d="M1285 750 L1285 820 L585 820 L585 750"/>

  <text x="80" y="920" class="caption">图 11-1 固定工作流、人工确认和发布动作的边界</text>
</svg>
