<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M0 0 L12 6 L0 12 z" fill="#2f86b7"/>
    </marker>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 44px sans-serif; fill: #132033; }
      .subtitle { font: 500 20px sans-serif; fill: #5d6b7c; }
      .box { fill: #ffffff; stroke: #c8d4df; stroke-width: 2.5; rx: 14; }
      .box-blue { fill: #e8f5fb; stroke: #64b5df; stroke-width: 2.5; rx: 14; }
      .box-green { fill: #edf8f2; stroke: #78bea1; stroke-width: 2.5; rx: 14; }
      .box-yellow { fill: #fff8e6; stroke: #d7b95f; stroke-width: 2.5; rx: 14; }
      .box-red { fill: #fff1f1; stroke: #e58a8a; stroke-width: 2.5; rx: 14; }
      .label { font: 700 24px sans-serif; fill: #142033; text-anchor: middle; }
      .text { font: 500 18px sans-serif; fill: #5d6b7c; text-anchor: middle; }
      .arrow { stroke: #2f86b7; stroke-width: 5; fill: none; marker-end: url(#arrow-blue); }
      .guard { stroke: #7a8898; stroke-width: 3.5; fill: none; stroke-dasharray: 10 8; }
      .caption { font: 500 18px sans-serif; fill: #667386; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1000"/>
  <text x="80" y="95" class="title">移动端多模态截图分析链路</text>
  <text x="80" y="132" class="subtitle">客户端采集体验，服务端处理文件安全和模型调用，业务系统只接收已确认的结构化结果</text>

  <rect class="box" x="80" y="290" width="240" height="130"/>
  <text x="200" y="342" class="label">移动端截图</text>
  <text x="200" y="376" class="text">相册 / 系统截屏</text>

  <rect class="box-blue" x="430" y="290" width="250" height="130"/>
  <text x="555" y="342" class="label">上传到服务端</text>
  <text x="555" y="376" class="text">鉴权 / 限流 / 断点</text>

  <rect class="box-yellow" x="790" y="290" width="250" height="130"/>
  <text x="915" y="342" class="label">文件预处理</text>
  <text x="915" y="376" class="text">类型 / 大小 / 脱敏</text>

  <rect class="box-green" x="1150" y="290" width="250" height="130"/>
  <text x="1275" y="342" class="label">多模态模型</text>
  <text x="1275" y="376" class="text">图片 + 任务 Prompt</text>

  <rect class="box-red" x="1510" y="290" width="250" height="130"/>
  <text x="1635" y="342" class="label">结构化结果</text>
  <text x="1635" y="376" class="text">摘要 / 原因 / 下一步</text>

  <rect class="box" x="430" y="620" width="250" height="130"/>
  <text x="555" y="672" class="label">权限与隐私</text>
  <text x="555" y="706" class="text">相册权限 / 可见信息</text>

  <rect class="box" x="790" y="620" width="250" height="130"/>
  <text x="915" y="672" class="label">安全检查</text>
  <text x="915" y="706" class="text">MIME / 尺寸 / 元数据</text>

  <rect class="box" x="1150" y="620" width="250" height="130"/>
  <text x="1275" y="672" class="label">人工确认</text>
  <text x="1275" y="706" class="text">创建工单前确认</text>

  <path class="arrow" d="M320 355 L428 355"/>
  <path class="arrow" d="M680 355 L788 355"/>
  <path class="arrow" d="M1040 355 L1148 355"/>
  <path class="arrow" d="M1400 355 L1508 355"/>

  <path class="guard" d="M555 420 L555 620"/>
  <path class="guard" d="M915 420 L915 620"/>
  <path class="arrow" d="M1635 420 L1635 685 L1402 685"/>

  <text x="80" y="920" class="caption">图 12-1 移动端截图分析的多模态工程链路</text>
</svg>
