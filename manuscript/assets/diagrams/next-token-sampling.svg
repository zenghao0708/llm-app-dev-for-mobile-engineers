<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1450" viewBox="0 0 2600 1450">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd6e0; stroke-width: 3; rx: 26; }
      .box { fill: #ffffff; stroke: #c8d3df; stroke-width: 3; rx: 22; }
      .model { fill: #edf5fb; stroke: #72b6d7; stroke-width: 3; rx: 22; }
      .sample { fill: #edf8f5; stroke: #78b79f; stroke-width: 3; rx: 22; }
      .warn { fill: #fff7ed; stroke: #d89b52; stroke-width: 3; rx: 22; }
      .bar1 { fill: #2f80a7; }
      .bar2 { fill: #79b79f; }
      .bar3 { fill: #d89b52; }
      .bar4 { fill: #9aa6b2; }
      .title { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 60px; font-weight: 700; fill: #142033; }
      .label { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #142033; }
      .small { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 24px; fill: #526173; }
      .tiny { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 21px; fill: #526173; }
      .arrow { stroke: #2f80a7; stroke-width: 4.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L18,9 L0,18 z" fill="#2f80a7"/>
    </marker>
  </defs>
  <rect class="bg" width="2600" height="1450"/>
  <text x="120" y="130" class="title">下一个 Token 的概率生成</text>
  <text x="120" y="182" class="small">大模型按步骤预测候选 Token 的概率，再由采样参数决定实际输出</text>

  <rect x="150" y="330" width="480" height="210" class="box"/>
  <text x="390" y="415" text-anchor="middle" class="label">当前上下文</text>
  <text x="390" y="465" text-anchor="middle" class="small">建议先 ____</text>

  <rect x="790" y="330" width="430" height="210" class="model"/>
  <text x="1005" y="415" text-anchor="middle" class="label">Transformer</text>
  <text x="1005" y="465" text-anchor="middle" class="small">结合上下文计算候选分数</text>

  <rect x="1380" y="285" width="430" height="300" class="panel"/>
  <text x="1595" y="355" text-anchor="middle" class="label">概率分布</text>
  <text x="1435" y="420" class="tiny">检查</text>
  <rect x="1510" y="398" width="220" height="28" class="bar1"/>
  <text x="1750" y="420" class="tiny">0.62</text>
  <text x="1435" y="465" class="tiny">查看</text>
  <rect x="1510" y="443" width="90" height="28" class="bar2"/>
  <text x="1750" y="465" class="tiny">0.18</text>
  <text x="1435" y="510" class="tiny">重启</text>
  <rect x="1510" y="488" width="55" height="28" class="bar3"/>
  <text x="1750" y="510" class="tiny">0.10</text>
  <text x="1435" y="555" class="tiny">删除</text>
  <rect x="1510" y="533" width="35" height="28" class="bar4"/>
  <text x="1750" y="555" class="tiny">0.06</text>

  <rect x="1980" y="330" width="420" height="210" class="sample"/>
  <text x="2190" y="415" text-anchor="middle" class="label">采样器</text>
  <text x="2190" y="465" text-anchor="middle" class="small">temperature / top-p</text>

  <path class="arrow" d="M630 435 L790 435"/>
  <path class="arrow" d="M1220 435 L1380 435"/>
  <path class="arrow" d="M1810 435 L1980 435"/>

  <rect x="420" y="800" width="520" height="190" class="warn"/>
  <text x="680" y="875" text-anchor="middle" class="label">低温度</text>
  <text x="680" y="925" text-anchor="middle" class="small">高概率候选更占优势</text>
  <text x="680" y="965" text-anchor="middle" class="small">输出更稳定、更保守</text>

  <rect x="1060" y="800" width="520" height="190" class="warn"/>
  <text x="1320" y="875" text-anchor="middle" class="label">高温度</text>
  <text x="1320" y="925" text-anchor="middle" class="small">分布更平，长尾更容易被采到</text>
  <text x="1320" y="965" text-anchor="middle" class="small">输出更多样，也更不稳定</text>

  <rect x="1700" y="800" width="520" height="190" class="warn"/>
  <text x="1960" y="875" text-anchor="middle" class="label">工程结论</text>
  <text x="1960" y="925" text-anchor="middle" class="small">稳定任务用低温度</text>
  <text x="1960" y="965" text-anchor="middle" class="small">事实任务还需要检索与校验</text>

  <path class="arrow" d="M2190 540 L2190 800"/>
  <path class="arrow" d="M1980 895 L1580 895"/>
  <path class="arrow" d="M1060 895 L940 895"/>

  <text x="120" y="1335" class="small">图 2-2 大模型生成下一个 Token 的简化过程</text>
</svg>

