<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2f86b7"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7a8898"/>
    </marker>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 44px sans-serif; fill: #132033; }
      .subtitle { font: 500 20px sans-serif; fill: #5c6b7a; }
      .box { fill: #ffffff; stroke: #c8d4df; stroke-width: 2.5; rx: 16; }
      .box-blue { fill: #e8f5fb; stroke: #64b5df; stroke-width: 2.5; rx: 16; }
      .box-green { fill: #edf8f2; stroke: #78bea1; stroke-width: 2.5; rx: 16; }
      .box-yellow { fill: #fff8e6; stroke: #d7b95f; stroke-width: 2.5; rx: 16; }
      .label { font: 700 26px sans-serif; fill: #142033; text-anchor: middle; }
      .text { font: 500 18px sans-serif; fill: #5d6b7c; text-anchor: middle; }
      .small { font: 500 16px monospace; fill: #5d6b7c; text-anchor: middle; }
      .arrow { stroke: #2f86b7; stroke-width: 5; fill: none; marker-end: url(#arrow-blue); }
      .arrow-gray { stroke: #7a8898; stroke-width: 4; fill: none; marker-end: url(#arrow-gray); stroke-dasharray: 10 10; }
      .caption { font: 500 18px sans-serif; fill: #667386; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1000"/>
  <text x="80" y="95" class="title">Embedding 与向量检索流程</text>
  <text x="80" y="132" class="subtitle">离线把文档片段变成向量索引，在线把用户问题变成查询向量并召回 Top-K 片段</text>

  <rect class="box" x="90" y="250" width="280" height="125"/>
  <text x="230" y="304" class="label">文档片段 A</text>
  <text x="230" y="340" class="text">API Key 管理</text>

  <rect class="box" x="90" y="430" width="280" height="125"/>
  <text x="230" y="484" class="label">文档片段 B</text>
  <text x="230" y="520" class="text">流式输出规范</text>

  <rect class="box-blue" x="480" y="325" width="300" height="155"/>
  <text x="630" y="388" class="label">向量化方法</text>
  <text x="630" y="426" class="text">神经 Embedding 或 TF-IDF 实验</text>

  <rect class="box-green" x="890" y="250" width="300" height="125"/>
  <text x="1040" y="302" class="label">向量 A</text>
  <text x="1040" y="340" class="small">[0.13, 0.02, ...]</text>

  <rect class="box-green" x="890" y="430" width="300" height="125"/>
  <text x="1040" y="482" class="label">向量 B</text>
  <text x="1040" y="520" class="small">[0.04, 0.18, ...]</text>

  <rect class="box-yellow" x="1300" y="325" width="320" height="155"/>
  <text x="1460" y="388" class="label">向量索引</text>
  <text x="1460" y="426" class="text">向量 + 元数据 + 权限标签</text>

  <rect class="box" x="90" y="700" width="300" height="125"/>
  <text x="240" y="754" class="label">用户问题</text>
  <text x="240" y="790" class="text">为什么不能保存 API Key？</text>

  <rect class="box-blue" x="500" y="700" width="280" height="125"/>
  <text x="640" y="754" class="label">查询向量化</text>
  <text x="640" y="790" class="text">同一方法与同一版本</text>

  <rect class="box-green" x="900" y="700" width="280" height="125"/>
  <text x="1040" y="754" class="label">查询向量</text>
  <text x="1040" y="790" class="small">[0.12, 0.01, ...]</text>

  <rect class="box-yellow" x="1300" y="680" width="320" height="165"/>
  <text x="1460" y="744" class="label">Top-K 召回</text>
  <text x="1460" y="782" class="text">按相似度排序</text>
  <text x="1460" y="816" class="text">返回片段与引用来源</text>

  <path class="arrow" d="M 370 312 L 480 382"/>
  <path class="arrow" d="M 370 492 L 480 425"/>
  <path class="arrow" d="M 780 382 L 890 312"/>
  <path class="arrow" d="M 780 425 L 890 492"/>
  <path class="arrow" d="M 1190 312 L 1300 382"/>
  <path class="arrow" d="M 1190 492 L 1300 425"/>

  <path class="arrow" d="M 390 762 L 500 762"/>
  <path class="arrow" d="M 780 762 L 900 762"/>
  <path class="arrow" d="M 1180 762 L 1300 762"/>
  <path class="arrow-gray" d="M 1460 480 L 1460 680"/>

  <text x="90" y="930" class="caption">图 7-1 Embedding 与向量检索的离线索引和在线查询流程</text>
</svg>
